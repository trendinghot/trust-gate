kind = "web"
previewPath = "/verifynet/"
title = "VerifyNet"
version = "1.0.0"
id = "artifacts/verifynet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/verifynet/" ]
localPort = 20241

[services.development]
run = "pnpm --filter @workspace/verifynet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/verifynet", "run", "build" ]
publicDir = "artifacts/verifynet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20241"
BASE_PATH = "/verifynet/"
